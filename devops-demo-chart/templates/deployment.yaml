apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-demo
  namespace: demo-app
  labels:
    app.kubernetes.io/name: devops-demo-chart
    app.kubernetes.io/instance: devops-demo
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: devops-demo-chart
      app.kubernetes.io/instance: devops-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devops-demo-chart
        app.kubernetes.io/instance: devops-demo
    spec:
      containers:
        - name: devops-demo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
